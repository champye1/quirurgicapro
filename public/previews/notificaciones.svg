<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <rect width="960" height="600" fill="#f1f5f9"/>
  <!-- Header -->
  <rect width="960" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="20" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.5">CENTRO DE NOTIFICACIONES</text>
  <text x="24" y="44" font-family="system-ui,sans-serif" font-size="19" fill="#0f172a" font-weight="900">Notificaciones</text>
  <rect x="890" y="16" width="32" height="20" rx="10" fill="#dc2626"/>
  <text x="906" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#ffffff" font-weight="900" text-anchor="middle">5</text>
  <!-- Notification cards -->
  <!-- 1 - Nueva solicitud -->
  <rect x="24" y="76" width="912" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="24" y="76" width="4" height="90" rx="2" fill="#d97706"/>
  <rect x="38" y="94" width="38" height="38" rx="10" fill="#fef3c7"/>
  <text x="57" y="119" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">📋</text>
  <text x="92" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a" font-weight="700">Nueva solicitud de cirugía</text>
  <text x="92" y="118" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Dr. Rodríguez ha enviado una solicitud para María González — Colecistectomía laparoscópica.</text>
  <text x="92" y="152" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Hace 5 minutos</text>
  <rect x="830" y="94" width="88" height="28" rx="8" fill="#fef3c7"/>
  <text x="874" y="112" font-family="system-ui,sans-serif" font-size="11" fill="#d97706" font-weight="700" text-anchor="middle">Ver solicitud</text>
  <!-- 2 - Cirugía confirmada -->
  <rect x="24" y="182" width="912" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="24" y="182" width="4" height="90" rx="2" fill="#16a34a"/>
  <rect x="38" y="200" width="38" height="38" rx="10" fill="#dcfce7"/>
  <text x="57" y="225" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">✅</text>
  <text x="92" y="206" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a" font-weight="700">Cirugía confirmada para mañana</text>
  <text x="92" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Cirugía de Juan Fuentes programada para el Miércoles 4 Jun, 07:30 — Pabellón 1.</text>
  <text x="92" y="258" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Hace 1 hora</text>
  <rect x="830" y="200" width="88" height="28" rx="8" fill="#dcfce7"/>
  <text x="874" y="218" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle">Ver cirugía</text>
  <!-- 3 - Stock crítico -->
  <rect x="24" y="288" width="912" height="90" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="24" y="288" width="4" height="90" rx="2" fill="#dc2626"/>
  <rect x="38" y="306" width="38" height="38" rx="10" fill="#fee2e2"/>
  <text x="57" y="331" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">⚠️</text>
  <text x="92" y="312" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a" font-weight="700">Stock crítico — Guante de látex 7.5</text>
  <text x="92" y="330" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Solo quedan 2 unidades. El stock mínimo es 50. Se recomienda reabastecer de inmediato.</text>
  <text x="92" y="364" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Hace 2 horas</text>
  <rect x="830" y="306" width="88" height="28" rx="8" fill="#fee2e2"/>
  <text x="874" y="324" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle">Ver insumo</text>
  <!-- 4 - Correo externo -->
  <rect x="24" y="394" width="912" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="24" y="394" width="4" height="90" rx="2" fill="#7c3aed"/>
  <rect x="38" y="412" width="38" height="38" rx="10" fill="#ede9fe"/>
  <text x="57" y="437" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">✉️</text>
  <text x="92" y="418" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a" font-weight="700">Correo externo recibido</text>
  <text x="92" y="436" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Nueva consulta desde el formulario web: "Necesito información sobre disponibilidad para cirugía."</text>
  <text x="92" y="470" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Hace 3 horas</text>
  <rect x="830" y="412" width="88" height="28" rx="8" fill="#ede9fe"/>
  <text x="874" y="430" font-family="system-ui,sans-serif" font-size="11" fill="#7c3aed" font-weight="700" text-anchor="middle">Ver correo</text>
  <!-- 5 - Recordatorio -->
  <rect x="24" y="500" width="912" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <rect x="38" y="516" width="38" height="38" rx="10" fill="#f1f5f9"/>
  <text x="57" y="541" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">🔔</text>
  <text x="92" y="524" font-family="system-ui,sans-serif" font-size="13" fill="#64748b" font-weight="600">Recordatorio de cirugía enviado</text>
  <text x="92" y="542" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">Se notificó al Dr. Castro sobre su cirugía del Viernes 6 Jun a las 08:30.</text>
  <text x="92" y="568" font-family="system-ui,sans-serif" font-size="11" fill="#cbd5e1">Ayer, 18:00</text>
</svg>
